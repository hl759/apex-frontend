<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="theme-color" content="#080c14"/>
<title>APEX TRADE — AI Sports Intelligence</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#080c14;color:#cdd3e0;font-family:system-ui,-apple-system,sans-serif;min-height:100vh}
  ::-webkit-scrollbar{width:4px}
  ::-webkit-scrollbar-track{background:#080c14}
  ::-webkit-scrollbar-thumb{background:#1e2535;border-radius:2px}
  input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}
  button{font-family:inherit;cursor:pointer}
  .header{background:#0a0f1a;border-bottom:1px solid #1e2535;padding:12px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
  .logo{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,#4a9eff,#00d4a0);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
  .tabs{background:#0a0f1a;border-bottom:1px solid #1e2535;display:flex;overflow-x:auto;padding:0 16px}
  .tab{background:transparent;border:none;border-bottom:2px solid transparent;color:#555;padding:12px 16px;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap;transition:all .2s}
  .tab.active{color:#4a9eff;border-bottom-color:#4a9eff}
  .content{max-width:900px;margin:0 auto;padding:16px}
  .card{background:#111827;border:1px solid #1e2535;border-radius:14px;margin-bottom:14px;overflow:hidden}
  .card-inner{background:#0d1117;border:1px solid #1e2535;border-radius:10px;padding:14px 16px;margin-bottom:10px;cursor:pointer}
  .badge{border-radius:4px;padding:2px 8px;font-size:11px;font-weight:700}
  .stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin-bottom:16px}
  .stat-box{background:#111827;border:1px solid #1e2535;border-radius:10px;padding:12px 14px}
  .btn-primary{background:linear-gradient(135deg,#4a9eff,#00d4a0);border:none;border-radius:12px;padding:14px 28px;color:#fff;font-weight:700;font-size:15px}
  .btn-small{background:transparent;border:1px solid #1e2535;border-radius:8px;padding:4px 12px;color:#4a9eff;font-size:11px;font-weight:600}
  .chat-wrap{height:52vh;overflow-y:auto;padding-bottom:8px;margin-bottom:12px}
  .chat-input{flex:1;background:#111827;border:1px solid #1e2535;border-radius:12px;padding:12px 16px;color:#fff;font-size:13px;outline:none}
  .chip{background:#111827;border:1px solid #1e2535;border-radius:20px;padding:5px 12px;color:#888;font-size:11px;white-space:nowrap;flex-shrink:0}
  .chips{display:flex;gap:6px;overflow-x:auto;margin-bottom:10px;padding-bottom:4px}
  .alert-green{background:#00d4a014;border:1px solid #00d4a044;border-radius:10px;padding:10px 14px;margin-bottom:14px}
  .alert-red{background:#ff5e5e14;border:1px solid #ff5e5e44;border-radius:10px;padding:10px 14px;margin-bottom:14px}
  .empty{text-align:center;padding:60px 20px}
  @keyframes pulse{0%,80%,100%{transform:scale(.8);opacity:.4}40%{transform:scale(1);opacity:1}}
  .dot{width:6px;height:6px;border-radius:50%;display:inline-block;animation:pulse 1.2s ease-in-out infinite}
</style>
</head>
<body>

<!-- Will be replaced by React app below -->
<div id="root"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

// ── CONFIGURE AQUI após deploy do Render ──────────────────────────────────
// Substitua pela URL do seu serviço no Render após o deploy
const BACKEND_URL = "https://apex-backend-ccxs.onrender.com";
// ─────────────────────────────────────────────────────────────────────────

const SYSTEM_PROMPT = `Você é APEX TRADE — uma inteligência artificial de elite especializada em trade esportivo de futebol, construída sobre a sabedoria coletiva dos 100 traders esportivos profissionais mais lucrativos do mundo.

MISSÃO: Identificar oportunidades de valor esperado positivo (EV+) com máxima precisão estatística.

REGRAS INEGOCIÁVEIS:
1. NUNCA prometer lucro garantido
2. SEMPRE informar o risco
3. NUNCA recomendar all-in
4. Priorizar consistência acima de lucro rápido

FORMATO — responda SEMPRE em JSON puro (sem markdown, sem backticks):

Para análise de jogos:
{
  "type": "analysis",
  "matches": [
    {
      "id": "id",
      "homeTeam": "Time Casa",
      "awayTeam": "Time Visitante",
      "league": "Liga",
      "country": "País",
      "time": "HH:MM",
      "status": "pre-live",
      "score": "-",
      "xgHome": 1.4,
      "xgAway": 1.0,
      "matchContext": "Contexto técnico",
      "opportunities": [
        {
          "market": "Over 2.5 Gols",
          "selection": "Over 2.5",
          "odds": 1.85,
          "probability": 65,
          "confidence": 78,
          "ev": 5.2,
          "stake": 3,
          "timing": "Pré-live",
          "cashout": "Momento ideal de saída",
          "riskLevel": "baixo",
          "rationale": "Explicação técnica detalhada",
          "keyStats": ["stat1", "stat2"],
          "suspiciousMovement": false,
          "consistencyScore": 76
        }
      ]
    }
  ],
  "dailySummary": "Resumo do dia",
  "marketAlert": null
}

Para chat: {"type":"chat","message":"resposta"}

Selecione TOP 5 jogos com maior EV+. Priorize qualidade.`;

const riskColor={baixo:"#00d4a0",médio:"#f5c842",alto:"#ff5e5e"};
const modeColor={conservador:"#4a9eff",moderado:"#f5c842",agressivo:"#ff5e5e"};
const statusLabel={"pre-live":"PRÉ-LIVE",live:"AO VIVO",upcoming:"EM BREVE",finished:"ENCERRADO"};
const statusColor={"pre-live":"#4a9eff",live:"#00d4a0",upcoming:"#888",finished:"#444"};

function ScoreRing({score,size=52}){
  const r=size/2-6,circ=2*Math.PI*r,dash=(score/100)*circ;
  const color=score>=80?"#00d4a0":score>=65?"#f5c842":"#ff5e5e";
  return(
    <svg width={size} height={size} style={{flexShrink:0}}>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="#1e2535" strokeWidth={5}/>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={5}
        strokeDasharray={`${dash} ${circ}`} strokeLinecap="round"
        transform={`rotate(-90 ${size/2} ${size/2})`}/>
      <text x={size/2} y={size/2+1} textAnchor="middle" dominantBaseline="middle"
        fill={color} fontSize={size*0.22} fontWeight="700" fontFamily="monospace">{score}</text>
    </svg>
  );
}

function EVBadge({ev}){
  const n=Number(ev),color=n>=7?"#00d4a0":n>=4?"#f5c842":"#888";
  return <span className="badge" style={{background:color+"22",color,border:`1px solid ${color}55`}}>EV+{n.toFixed(1)}%</span>;
}

function OppCard({opp}){
  const [exp,setExp]=useState(false);
  return(
    <div className="card-inner" onClick={()=>setExp(e=>!e)}>
      <div style={{display:"flex",alignItems:"center",gap:12,flexWrap:"wrap"}}>
        <ScoreRing score={opp.consistencyScore}/>
        <div style={{flex:1,minWidth:0}}>
          <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap",marginBottom:4}}>
            <span style={{color:"#fff",fontWeight:700,fontSize:14}}>{opp.market}</span>
            <span style={{color:"#888"}}>→</span>
            <span style={{color:"#4a9eff",fontWeight:600,fontSize:13}}>{opp.selection}</span>
            {opp.suspiciousMovement&&<span className="badge" style={{background:"#ff5e5e22",color:"#ff5e5e",border:"1px solid #ff5e5e44"}}>⚠ SUSPEITO</span>}
          </div>
          <div style={{display:"flex",gap:8,flexWrap:"wrap",alignItems:"center"}}>
            <EVBadge ev={opp.ev}/>
            <span style={{color:"#888",fontSize:12}}>Odds <b style={{color:"#fff"}}>{opp.odds}</b></span>
            <span style={{color:"#888",fontSize:12}}>Prob <b style={{color:"#f5c842"}}>{opp.probability}%</b></span>
            <span style={{color:riskColor[opp.riskLevel]||"#888",fontSize:11,fontWeight:600}}>{opp.riskLevel?.toUpperCase()}</span>
          </div>
        </div>
        <div style={{textAlign:"right",flexShrink:0}}>
          <div style={{color:"#00d4a0",fontWeight:700,fontSize:18}}>{opp.stake}%</div>
          <div style={{color:"#888",fontSize:10}}>STAKE</div>
        </div>
      </div>
      {exp&&(
        <div style={{marginTop:14,paddingTop:14,borderTop:"1px solid #1e2535"}}>
          <div style={{marginBottom:10}}>
            <div style={{color:"#888",fontSize:11,fontWeight:600,marginBottom:5,letterSpacing:1}}>RACIONAL DA ENTRADA</div>
            <p style={{color:"#cdd3e0",fontSize:13,lineHeight:1.6,margin:0}}>{opp.rationale}</p>
          </div>
          <div style={{display:"flex",gap:16,flexWrap:"wrap",marginBottom:10}}>
            <div><div style={{color:"#888",fontSize:11,marginBottom:4}}>TIMING</div><div style={{color:"#4a9eff",fontSize:13,fontWeight:600}}>⏱ {opp.timing}</div></div>
            <div><div style={{color:"#888",fontSize:11,marginBottom:4}}>CASHOUT</div><div style={{color:"#f5c842",fontSize:13,fontWeight:600}}>💰 {opp.cashout}</div></div>
            <div><div style={{color:"#888",fontSize:11,marginBottom:4}}>CONFIANÇA</div><div style={{color:"#00d4a0",fontSize:13,fontWeight:700}}>{opp.confidence}%</div></div>
          </div>
          {opp.keyStats?.length>0&&(
            <div>
              <div style={{color:"#888",fontSize:11,marginBottom:6}}>DADOS-CHAVE</div>
              <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                {opp.keyStats.map((s,i)=><span key={i} style={{background:"#1e2535",color:"#cdd3e0",borderRadius:4,padding:"3px 9px",fontSize:11}}>{s}</span>)}
              </div>
            </div>
          )}
        </div>
      )}
    </div>
  );
}

function MatchCard({match}){
  const [open,setOpen]=useState(true);
  const st=match.status;
  return(
    <div className="card">
      <div onClick={()=>setOpen(o=>!o)} style={{padding:"14px 18px",display:"flex",alignItems:"center",gap:12,cursor:"pointer"}}>
        <div style={{flex:1}}>
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:3,flexWrap:"wrap"}}>
            <span className="badge" style={{color:statusColor[st]||"#888",border:`1px solid ${statusColor[st]||"#888"}55`}}>{statusLabel[st]||st?.toUpperCase()}</span>
            <span style={{color:"#888",fontSize:11}}>{match.league}</span>
            {match.country&&<span style={{color:"#555",fontSize:11}}>• {match.country}</span>}
            <span style={{color:"#555",fontSize:11}}>• {match.time}</span>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:10,flexWrap:"wrap"}}>
            <span style={{color:"#fff",fontWeight:700,fontSize:15}}>{match.homeTeam}</span>
            <span style={{color:"#4a9eff",fontWeight:700,fontSize:14}}>{match.score!=="-"?match.score:"vs"}</span>
            <span style={{color:"#fff",fontWeight:700,fontSize:15}}>{match.awayTeam}</span>
          </div>
          <div style={{marginTop:4,display:"flex",gap:12}}>
            <span style={{color:"#888",fontSize:11}}>xG Casa <b style={{color:"#00d4a0"}}>{match.xgHome}</b></span>
            <span style={{color:"#888",fontSize:11}}>xG Fora <b style={{color:"#f5c842"}}>{match.xgAway}</b></span>
            <span style={{color:"#888",fontSize:11}}>{match.opportunities?.length||0} oport.</span>
          </div>
        </div>
        <span style={{color:"#555",fontSize:18}}>{open?"▾":"▸"}</span>
      </div>
      {open&&(
        <div style={{padding:"0 14px 14px"}}>
          {match.matchContext&&<p style={{color:"#6b7385",fontSize:12,margin:"10px 0 12px",fontStyle:"italic"}}>{match.matchContext}</p>}
          {match.opportunities?.map((opp,i)=><OppCard key={i} opp={opp}/>)}
        </div>
      )}
    </div>
  );
}

function ChatBubble({msg}){
  const isUser=msg.role==="user";
  return(
    <div style={{display:"flex",justifyContent:isUser?"flex-end":"flex-start",marginBottom:12}}>
      {!isUser&&<div style={{width:32,height:32,borderRadius:"50%",background:"linear-gradient(135deg,#4a9eff,#00d4a0)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,flexShrink:0,marginRight:8,marginTop:2}}>⚡</div>}
      <div style={{maxWidth:"82%",background:isUser?"#162036":"#111827",border:`1px solid ${isUser?"#4a9eff44":"#1e2535"}`,borderRadius:isUser?"16px 16px 4px 16px":"16px 16px 16px 4px",padding:"12px 16px"}}>
        <p style={{color:"#cdd3e0",fontSize:13,lineHeight:1.7,margin:0,whiteSpace:"pre-wrap"}}>{msg.content}</p>
      </div>
    </div>
  );
}

function BankrollSim(){
  const [bank,setBank]=useState(1000);
  const [profile,setProfile]=useState("moderado");
  const cfgs={conservador:{stake:1,winRate:56,avgOdds:1.75,color:"#4a9eff"},moderado:{stake:2.5,winRate:58,avgOdds:1.85,color:"#f5c842"},agressivo:{stake:4,winRate:60,avgOdds:2.10,color:"#ff5e5e"}};
  const cfg=cfgs[profile];
  let b=bank;const data=[b];
  for(let i=0;i<240;i++){const win=Math.random()<cfg.winRate/100;b=win?b+(b*cfg.stake/100)*(cfg.avgOdds-1):b-(b*cfg.stake/100);if(i%20===19)data.push(Math.round(b));}
  const growth=((data[data.length-1]-bank)/bank*100).toFixed(0);
  const max=Math.max(...data),min=Math.min(...data),range=max-min||1;
  const W=300,H=80,pts=data.map((v,i)=>`${(i/(data.length-1))*W},${H-((v-min)/range)*(H-8)-4}`).join(" ");
  return(
    <div className="card" style={{padding:18}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
        <span style={{color:"#fff",fontWeight:700,fontSize:14}}>Simulador de Crescimento</span>
        <div style={{display:"flex",gap:6}}>
          {["conservador","moderado","agressivo"].map(p=>(
            <button key={p} onClick={()=>setProfile(p)} style={{background:profile===p?cfgs[p].color+"33":"transparent",color:profile===p?cfgs[p].color:"#555",border:`1px solid ${profile===p?cfgs[p].color:"#2a3045"}`,borderRadius:6,padding:"3px 8px",fontSize:10,fontWeight:700,textTransform:"uppercase"}}>{p[0].toUpperCase()+p.slice(1,4)}</button>
          ))}
        </div>
      </div>
      <div style={{display:"flex",gap:12,marginBottom:14,flexWrap:"wrap"}}>
        <div style={{background:"#0d1117",borderRadius:8,padding:"8px 14px",flex:1,minWidth:80}}>
          <div style={{color:"#888",fontSize:10,marginBottom:2}}>BANCA INICIAL</div>
          <input value={bank} onChange={e=>setBank(Number(e.target.value)||1000)} style={{background:"transparent",border:"none",color:"#fff",fontWeight:700,fontSize:18,width:"100%",outline:"none"}} type="number"/>
        </div>
        <div style={{background:"#0d1117",borderRadius:8,padding:"8px 14px",flex:1,minWidth:80}}>
          <div style={{color:"#888",fontSize:10,marginBottom:2}}>PROJEÇÃO 12M</div>
          <div style={{color:cfg.color,fontWeight:700,fontSize:18}}>R$ {data[data.length-1].toLocaleString("pt-BR")}</div>
        </div>
        <div style={{background:"#0d1117",borderRadius:8,padding:"8px 14px",flex:1,minWidth:80}}>
          <div style={{color:"#888",fontSize:10,marginBottom:2}}>CRESCIMENTO</div>
          <div style={{color:Number(growth)>0?"#00d4a0":"#ff5e5e",fontWeight:700,fontSize:18}}>{growth>0?"+":""}{growth}%</div>
        </div>
      </div>
      <svg width="100%" viewBox={`0 0 ${W} ${H}`} preserveAspectRatio="none" style={{height:70}}>
        <defs><linearGradient id="sg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor={cfg.color} stopOpacity="0.3"/><stop offset="100%" stopColor={cfg.color} stopOpacity="0.02"/></linearGradient></defs>
        <polyline points={pts} fill="none" stroke={cfg.color} strokeWidth="1.5"/>
        <polygon points={`0,${H} ${pts} ${W},${H}`} fill="url(#sg)"/>
      </svg>
      <div style={{display:"flex",gap:16,marginTop:8,flexWrap:"wrap"}}>
        <span style={{color:"#555",fontSize:11}}>Win Rate: <span style={{color:"#cdd3e0"}}>{cfg.winRate}%</span></span>
        <span style={{color:"#555",fontSize:11}}>Odds médias: <span style={{color:"#cdd3e0"}}>{cfg.avgOdds}</span></span>
        <span style={{color:"#555",fontSize:11}}>Stake: <span style={{color:cfg.color}}>{cfg.stake}%</span></span>
      </div>
    </div>
  );
}

function App(){
  const [tab,setTab]=useState("dashboard");
  const [chatMessages,setChatMessages]=useState([{role:"assistant",content:"⚡ APEX TRADE online!\n\nClique em '📊 Buscar Jogos de Hoje' para carregar as partidas reais e gerar análise completa.\n\nOu me faça qualquer pergunta sobre trade esportivo."}]);
  const [input,setInput]=useState("");
  const [loading,setLoading]=useState(false);
  const [loadingFix,setLoadingFix]=useState(false);
  const [analysisData,setAnalysisData]=useState(null);
  const [riskMode,setRiskMode]=useState("moderado");
  const [apiStatus,setApiStatus]=useState("idle");
  const chatEndRef=useRef(null);
  const history=useRef([]);

  useEffect(()=>{chatEndRef.current?.scrollIntoView({behavior:"smooth"});},[chatMessages]);

  const fetchFixtures=useCallback(async()=>{
    setApiStatus("loading");
    const res=await fetch(`${BACKEND_URL}/fixtures/today`);
    if(!res.ok)throw new Error(`HTTP ${res.status}`);
    const data=await res.json();
    if(!data.success)throw new Error(data.error||"API error");
    setApiStatus("ok");
    return data.fixtures||[];
  },[]);

  const runAnalysis=useCallback(async(fixtures)=>{
    if(!fixtures?.length){setLoadingFix(false);return;}
    const prompt=`Dados reais da ApiFootball — jogos de hoje ${new Date().toLocaleDateString("pt-BR")}:\n\n${JSON.stringify(fixtures,null,2)}\n\nSelecione os TOP 5 com maior EV+. Gere oportunidades detalhadas para perfil "${riskMode}". Responda APENAS com o JSON de análise.`;
    history.current.push({role:"user",content:prompt});
    try{
      const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,system:SYSTEM_PROMPT,messages:history.current})});
      const d=await res.json();
      const raw=d.content?.map(b=>b.text||"").join("")||"";
      history.current.push({role:"assistant",content:raw});
      let parsed;try{parsed=JSON.parse(raw.replace(/```json|```/g,"").trim());}catch{parsed={type:"chat",message:raw};}
      if(parsed.type==="analysis"){
        setAnalysisData(parsed);setTab("dashboard");
        setChatMessages(prev=>[...prev,{role:"assistant",content:`📊 ${fixtures.length} jogos reais analisados!\n\n${parsed.dailySummary||""}${parsed.marketAlert?"\n\n"+parsed.marketAlert:""}`}]);
      }else{setChatMessages(prev=>[...prev,{role:"assistant",content:parsed.message||raw}]);}
    }catch{setChatMessages(prev=>[...prev,{role:"assistant",content:"❌ Erro na análise IA. Tente novamente."}]);}
    setLoadingFix(false);
  },[riskMode]);

  const handleFetch=useCallback(async()=>{
    if(loadingFix)return;
    setLoadingFix(true);setTab("chat");
    setChatMessages(prev=>[...prev,{role:"user",content:"📊 Buscar e analisar jogos de hoje"},{role:"assistant",content:"🔄 Buscando jogos reais no backend..."}]);
    try{
      const fixtures=await fetchFixtures();
      if(fixtures.length>0){
        setChatMessages(prev=>[...prev,{role:"assistant",content:`✅ ${fixtures.length} jogos encontrados! Analisando com APEX TRADE IA...`}]);
        await runAnalysis(fixtures);
      }else{
        setChatMessages(prev=>[...prev,{role:"assistant",content:"⚠️ Nenhum jogo ativo agora. Tente mais tarde."}]);
        setLoadingFix(false);
      }
    }catch(e){
      setChatMessages(prev=>[...prev,{role:"assistant",content:`❌ Erro: ${e.message}\n\nVerifique se o backend está rodando no Render.`}]);
      setApiStatus("error");setLoadingFix(false);
    }
  },[loadingFix,fetchFixtures,runAnalysis]);

  const sendMessage=async()=>{
    const msg=input.trim();if(!msg||loading)return;
    setInput("");setLoading(true);
    setChatMessages(prev=>[...prev,{role:"user",content:msg}]);
    history.current.push({role:"user",content:`${msg}\n\n[Perfil: ${riskMode}]`});
    try{
      const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,system:SYSTEM_PROMPT,messages:history.current})});
      const d=await res.json();
      const raw=d.content?.map(b=>b.text||"").join("")||"";
      history.current.push({role:"assistant",content:raw});
      let parsed;try{parsed=JSON.parse(raw.replace(/```json|```/g,"").trim());}catch{parsed={type:"chat",message:raw};}
      if(parsed.type==="analysis"){setAnalysisData(parsed);setTab("dashboard");setChatMessages(prev=>[...prev,{role:"assistant",content:`📊 Dashboard atualizado!\n\n${parsed.dailySummary||""}`}]);}
      else{setChatMessages(prev=>[...prev,{role:"assistant",content:parsed.message||raw}]);}
    }catch{setChatMessages(prev=>[...prev,{role:"assistant",content:"❌ Erro. Tente novamente."}]);}
    setLoading(false);
  };

  const allOpp=(analysisData?.matches||[]).flatMap(m=>(m.opportunities||[]).map(o=>({...o,match:`${m.homeTeam} x ${m.awayTeam}`,league:m.league}))).sort((a,b)=>b.consistencyScore-a.consistencyScore);
  const tabs=[{id:"dashboard",label:"Dashboard",icon:"⚡"},{id:"opportunities",label:"Ranking",icon:"🎯"},{id:"chat",label:"IA Chat",icon:"🤖"},{id:"bankroll",label:"Banca",icon:"💰"}];
  const quickPrompts=[{label:"📊 Buscar Jogos de Hoje",action:handleFetch},{label:"💰 Gestão R$1000",msg:"Calcule a gestão de banca ideal para R$ 1000"},{label:"📈 Over/Under",msg:"Explique a melhor estratégia Over/Under no futebol"},{label:"🎯 Trade ao vivo",msg:"Como fazer trade ao vivo com segurança?"},{label:"⚠️ Erros comuns",msg:"Quais os erros mais comuns de traders iniciantes?"}];

  return(
    <div>
      <div className="header">
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <div className="logo">⚡</div>
          <div>
            <div style={{color:"#fff",fontWeight:800,fontSize:16,letterSpacing:1}}>APEX TRADE</div>
            <div style={{display:"flex",alignItems:"center",gap:5}}>
              <div style={{width:6,height:6,borderRadius:"50%",background:apiStatus==="ok"?"#00d4a0":apiStatus==="loading"?"#f5c842":apiStatus==="error"?"#ff5e5e":"#555"}}/>
              <span style={{color:"#555",fontSize:9,letterSpacing:1.5}}>{apiStatus==="ok"?"BACKEND OK":apiStatus==="loading"?"BUSCANDO...":apiStatus==="error"?"ERRO":"BACKEND"}</span>
            </div>
          </div>
        </div>
        <div style={{display:"flex",gap:5}}>
          {["conservador","moderado","agressivo"].map(m=>(
            <button key={m} onClick={()=>setRiskMode(m)} style={{background:riskMode===m?modeColor[m]+"22":"transparent",color:riskMode===m?modeColor[m]:"#444",border:`1px solid ${riskMode===m?modeColor[m]:"#1e2535"}`,borderRadius:6,padding:"3px 8px",fontSize:10,fontWeight:700,textTransform:"uppercase"}}>{m[0].toUpperCase()}</button>
          ))}
        </div>
      </div>

      <div className="tabs">
        {tabs.map(t=><button key={t.id} className={`tab${tab===t.id?" active":""}`} onClick={()=>setTab(t.id)}>{t.icon} {t.label}</button>)}
      </div>

      <div className="content">
        {tab==="dashboard"&&(
          <div>
            {!analysisData?(
              <div className="empty">
                <div style={{fontSize:48,marginBottom:16}}>⚡</div>
                <div style={{color:"#fff",fontWeight:700,fontSize:20,marginBottom:8}}>APEX TRADE pronto</div>
                <p style={{color:"#6b7385",fontSize:14,marginBottom:24,maxWidth:320,margin:"0 auto 24px"}}>Busque os jogos reais de hoje e deixe a IA analisar as melhores oportunidades.</p>
                <button className="btn-primary" onClick={handleFetch} disabled={loadingFix} style={{opacity:loadingFix?0.7:1}}>
                  {loadingFix?"🔄 Buscando...":"📊 Buscar Jogos de Hoje"}
                </button>
              </div>
            ):(
              <div>
                {analysisData.marketAlert&&<div className="alert-red"><p style={{color:"#ff8888",fontSize:12,margin:0,lineHeight:1.5}}>{analysisData.marketAlert}</p></div>}
                {analysisData.dailySummary&&<div className="alert-green"><div style={{color:"#00d4a0",fontSize:11,fontWeight:700,marginBottom:4,letterSpacing:1}}>RESUMO DO DIA</div><p style={{color:"#cdd3e0",fontSize:13,margin:0,lineHeight:1.5}}>{analysisData.dailySummary}</p></div>}
                <div className="stat-grid">
                  {[{label:"Jogos",value:analysisData.matches.length,color:"#4a9eff",icon:"⚽"},{label:"Oportunidades",value:allOpp.length,color:"#00d4a0",icon:"🎯"},{label:"EV+ Médio",value:allOpp.length?(allOpp.reduce((s,o)=>s+Number(o.ev),0)/allOpp.length).toFixed(1)+"%":"-",color:"#f5c842",icon:"📈"},{label:"Score Médio",value:allOpp.length?Math.round(allOpp.reduce((s,o)=>s+o.consistencyScore,0)/allOpp.length):"-",color:"#a78bfa",icon:"⭐"}].map((s,i)=>(
                    <div key={i} className="stat-box">
                      <div style={{display:"flex",justifyContent:"space-between"}}><div style={{color:"#888",fontSize:10}}>{s.label.toUpperCase()}</div><span>{s.icon}</span></div>
                      <div style={{color:s.color,fontWeight:700,fontSize:22,marginTop:4}}>{s.value}</div>
                    </div>
                  ))}
                </div>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
                  <div style={{color:"#888",fontSize:11,fontWeight:600,letterSpacing:1.5}}>PARTIDAS ANALISADAS</div>
                  <button className="btn-small" onClick={handleFetch} disabled={loadingFix}>{loadingFix?"🔄":"↻ Atualizar"}</button>
                </div>
                {analysisData.matches.map(m=><MatchCard key={m.id} match={m}/>)}
              </div>
            )}
          </div>
        )}

        {tab==="opportunities"&&(
          <div>
            <div style={{color:"#888",fontSize:11,fontWeight:600,letterSpacing:1.5,marginBottom:12}}>RANKING DE OPORTUNIDADES — HOJE</div>
            {allOpp.length===0?(
              <div className="empty" style={{padding:"40px 20px",color:"#555"}}>
                <div style={{fontSize:32,marginBottom:12}}>🎯</div>
                <p>Busque os jogos primeiro.</p>
                <button className="btn-primary" onClick={handleFetch} style={{marginTop:16,padding:"10px 20px",fontSize:13}}>📊 Buscar Jogos</button>
              </div>
            ):allOpp.map((opp,i)=>(
              <div key={i} style={{background:"#111827",border:"1px solid #1e2535",borderRadius:12,padding:"14px 16px",marginBottom:10,display:"flex",gap:12,alignItems:"center"}}>
                <div style={{color:"#555",fontSize:14,fontWeight:700,minWidth:24,textAlign:"center"}}>#{i+1}</div>
                <ScoreRing score={opp.consistencyScore} size={50}/>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{color:"#888",fontSize:11,marginBottom:2}}>{opp.league} · {opp.match}</div>
                  <div style={{color:"#fff",fontWeight:700,fontSize:14,marginBottom:4}}>{opp.market} → <span style={{color:"#4a9eff"}}>{opp.selection}</span></div>
                  <div style={{display:"flex",gap:8,flexWrap:"wrap"}}><EVBadge ev={opp.ev}/><span style={{color:"#888",fontSize:12}}>Odds <b style={{color:"#fff"}}>{opp.odds}</b></span><span style={{color:riskColor[opp.riskLevel]||"#888",fontSize:11,fontWeight:600}}>{opp.riskLevel}</span></div>
                </div>
                <div style={{textAlign:"right",flexShrink:0}}><div style={{color:"#00d4a0",fontWeight:700,fontSize:20}}>{opp.stake}%</div><div style={{color:"#555",fontSize:10}}>STAKE</div></div>
              </div>
            ))}
          </div>
        )}

        {tab==="chat"&&(
          <div>
            <div className="chat-wrap">
              {chatMessages.map((m,i)=><ChatBubble key={i} msg={m}/>)}
              {(loading||loadingFix)&&(
                <div style={{display:"flex",gap:8,alignItems:"center",padding:"8px 0"}}>
                  <div style={{width:32,height:32,borderRadius:"50%",background:"linear-gradient(135deg,#4a9eff,#00d4a0)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:14}}>⚡</div>
                  <div style={{background:"#111827",border:"1px solid #1e2535",borderRadius:"16px 16px 16px 4px",padding:"12px 16px"}}>
                    <div style={{display:"flex",gap:4}}>
                      {[0,1,2].map(j=><div key={j} className="dot" style={{background:"#4a9eff",animationDelay:`${j*0.2}s`}}/>)}
                    </div>
                  </div>
                </div>
              )}
              <div ref={chatEndRef}/>
            </div>
            <div className="chips">
              {quickPrompts.map((p,i)=><button key={i} className="chip" onClick={()=>p.action?p.action():setInput(p.msg)}>{p.label}</button>)}
            </div>
            <div style={{display:"flex",gap:8}}>
              <input className="chat-input" value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&sendMessage()} placeholder="Pergunte sobre jogos, estratégias, gestão de banca..."/>
              <button onClick={sendMessage} disabled={loading||!input.trim()} style={{background:loading||!input.trim()?"#1a2535":"linear-gradient(135deg,#4a9eff,#00d4a0)",border:"none",borderRadius:12,width:46,color:"#fff",fontSize:18,flexShrink:0}}>{loading?"⏳":"→"}</button>
            </div>
          </div>
        )}

        {tab==="bankroll"&&(
          <div>
            <div style={{color:"#888",fontSize:11,fontWeight:600,letterSpacing:1.5,marginBottom:12}}>GESTÃO DE BANCA PROFISSIONAL</div>
            <BankrollSim/>
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(180px,1fr))",gap:10,marginBottom:14}}>
              {[{profile:"Conservador",stake:"1%",stopLoss:"-10%",color:"#4a9eff",desc:"Preservação de banca. Ideal para iniciantes."},{profile:"Moderado",stake:"2-3%",stopLoss:"-15%",color:"#f5c842",desc:"Equilíbrio crescimento/proteção. Recomendado."},{profile:"Agressivo",stake:"3-5%",stopLoss:"-20%",color:"#ff5e5e",desc:"Alto potencial. Apenas traders experientes."}].map((p,i)=>(
                <div key={i} style={{background:"#111827",border:`1px solid ${p.color}33`,borderRadius:12,padding:"14px 16px"}}>
                  <div style={{color:p.color,fontWeight:700,fontSize:13,marginBottom:8}}>{p.profile}</div>
                  <div style={{display:"flex",gap:8,marginBottom:10}}>
                    {[["Stake",p.stake],["Stop Loss",p.stopLoss]].map(([k,v])=>(
                      <div key={k} style={{background:"#0d1117",borderRadius:6,padding:"6px 10px",flex:1}}><div style={{color:"#555",fontSize:10}}>{k}</div><div style={{color:p.color,fontWeight:700,fontSize:14}}>{v}</div></div>
                    ))}
                  </div>
                  <p style={{color:"#6b7385",fontSize:11,margin:0}}>{p.desc}</p>
                </div>
              ))}
            </div>
            <div style={{background:"#ff5e5e0d",border:"1px solid #ff5e5e33",borderRadius:10,padding:"12px 16px"}}>
              <div style={{color:"#ff8888",fontSize:11,fontWeight:700,marginBottom:6}}>⚠️ AVISO IMPORTANTE</div>
              <p style={{color:"#6b7385",fontSize:12,margin:0,lineHeight:1.6}}>Trade esportivo envolve riscos financeiros reais. Esta IA oferece análise estatística e probabilística, não garantias de lucro. Nunca aposte mais do que pode perder.</p>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
